<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>雒文鹏的博客</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="description" content="格物致知 · 诚意正心 · 修身齐家">
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <!-- Google Fonts: Inter（正文/UI）+ Noto Serif SC（中文衬线标题） -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    img {text-align: center;}
    /* 锚点跳转时预留导航栏高度，避免标题被遮挡 */
    html { scroll-padding-top: 60px; }

    /* ===== 类 lixiaolai.com 风格 ===== */

    /* 柔和暖灰白背景 */
    :root {
      --base-background-color: #f8f8f9;
      --base-color: #2c2c2c;
      --base-font-family: 'Inter', 'Noto Serif SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --sidebar-width: 260px;
    }

    /* 标题使用衬线字体，更大更松 */
    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3 {
      font-family: 'Noto Serif SC', 'Georgia', serif;
      letter-spacing: 0.02em;
      color: #1a1a1a;
      border-bottom: none;
      font-weight: 600;
    }
    .markdown-section h1 { font-size: 2em; margin-top: 2.5em; }
    .markdown-section h2 { font-size: 1.5em; margin-top: 2em; }
    .markdown-section h3 { font-size: 1.2em; margin-top: 1.5em; }

    /* 正文行高和字间距更舒适 */
    .markdown-section {
      line-height: 1.85;
      letter-spacing: 0.01em;
      max-width: 800px;
    }
    .markdown-section p {
      margin: 1.2em 0;
    }

    /* 链接颜色更柔和 */
    .markdown-section a {
      color: #5b7aa2;
      text-decoration: none;
    }
    .markdown-section a:hover {
      color: #3d5a80;
      text-decoration: underline;
    }

    /* 侧边栏风格 */
    .sidebar {
      background-color: #fafafa;
      border-right: 1px solid #eee;
    }
    .sidebar li > a {
      font-size: 14px;
      color: #555;
    }
    .sidebar li > a:hover {
      color: #1a1a1a;
    }

    /* 导航栏 */
    .app-nav {
      color: #555;
    }

    /* 减少边框和分割线，多用留白 */
    .markdown-section hr {
      border: none;
      height: 1px;
      background: #e8e8e8;
      margin: 2em 0;
    }
    .markdown-section blockquote {
      border-left: 3px solid #d0d0d0;
      background: #fafafa;
    }

    /* ===== 封面页全屏背景图 ===== */
    .cover {
      background: url('images/hero-bg.jpg') no-repeat center center !important;
      background-size: cover !important;
      position: relative;
    }
    /* 深色蒙版 + 毛玻璃虚化，保证浅色文字可读 */
    .cover::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.52);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      z-index: 0;
      pointer-events: none;
    }
    /* 封面内容提升到遮罩层之上 */
    .cover-main {
      position: relative;
      z-index: 1;
    }
    /* 封面文字改为浅色 */
    .cover h1,
    .cover blockquote,
    .cover p,
    .cover ul li {
      color: #fff !important;
      text-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }
    /* Wenpeng LUO 标题：加大加粗，强对比 */
    .cover h1 {
      font-family: 'Noto Serif SC', 'Georgia', serif !important;
      font-size: 3.2em;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #ffffff !important;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }
    .cover blockquote {
      border-left-color: rgba(255,255,255,0.4);
    }
    /* 按钮：半透明底 + 白边框，确保可点击 */
    .cover-main a {
      position: relative;
      z-index: 2;
      color: #fff !important;
      border: 1px solid rgba(255,255,255,0.6) !important;
      background: rgba(255,255,255,0.08);
      border-radius: 2rem;
      padding: 0.5em 1.8em;
      transition: all 0.25s ease;
    }
    .cover-main a:hover {
      background: rgba(255,255,255,0.18) !important;
      border-color: rgba(255,255,255,0.9) !important;
      text-decoration: none !important;
    }
    /* 响应式：手机端适配 */
    @media screen and (max-width: 768px) {
      .cover {
        background-position: 55% center !important;
      }
      .cover h1 {
        font-size: 2.2em !important;
      }
      .cover blockquote {
        font-size: 0.95em;
      }
    }
  </style>
</head>
<body>
  <div id="app">网页加载中...请稍等</div>
  <script>
    window.$docsify = {
      el: '#app',
      repo: 'https://github.com/luowenpeng/luowenpeng.github.io/',
      loadNavbar: true,
      name: 'HOME',
      nameLink: '/',
      mergeNavbar: false,
      maxLevel: 2,
      subMaxLevel: 3,

      //coverpage
      coverpage: true,

      //search
      search: 'auto',

    }
  </script>
  <!-- 拦截 Docsify 路由，让类比修辞收集库跳转到独立页面（必须在 Docsify 之前执行） -->
  <script>
    (function() {
      var targetPath = '/analogy-collection.html';
      // 直接访问 #/analogy-collection.html 时，在 Docsify 加载前立即重定向
      var hash = window.location.hash;
      if (hash && hash.indexOf('analogy-collection.html') !== -1) {
        window.location.replace(targetPath);
      }
      // 点击链接时拦截（capture 阶段，优先于 Docsify）
      document.addEventListener('click', function(e) {
        var a = e.target.closest('a');
        if (a && a.getAttribute('href') && a.getAttribute('href').indexOf('analogy-collection.html') !== -1) {
          e.preventDefault();
          e.stopPropagation();
          window.location.href = targetPath;
        }
      }, true);
      // Docsify 通过 hashchange 处理路由，同样需要拦截
      window.addEventListener('hashchange', function() {
        var h = window.location.hash;
        if (h && h.indexOf('analogy-collection.html') !== -1) {
          window.location.replace(targetPath);
        }
      });
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
